<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Burma Burma Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f7f6f2; font-family: system-ui, sans-serif; padding: 50px 20px; }
    .logo-container { text-align: center; margin-bottom: 40px; }
    .bb-logo { width: 90px; height: 90px; border-radius: 50%; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    .portal-title { text-align: center; font-weight: 800; color: #01696f; margin-top: 15px; font-size: 26px; }
    
    .portal-btn {
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; border: 1.5px solid #e5e7eb; border-radius: 20px;
      padding: 20px 25px; margin-bottom: 20px; text-decoration: none;
      color: #111827; box-shadow: 0 4px 15px rgba(0,0,0,0.04); transition: all 0.2s;
    }
    .portal-btn:active { background: #f0fdf4; border-color: #16a34a; }
    
    .btn-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 18px; }
    .icon-emp { background: #e0f2fe; color: #0284c7; }
    .icon-app { background: #dcfce7; color: #16a34a; }
    .icon-acc { background: #f3e8ff; color: #4f46e5; }
    
    .btn-text h5 { margin: 0; font-weight: 800; font-size: 17px; color: #111827; }
    .btn-text p { margin: 0; font-size: 13px; color: #6b7280; }
    .chevron { color: #d1d5db; font-size: 24px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="https://drive.google.com/thumbnail?id=1OpUw3MCFGLRs7GQ4xezk5ouqYTvy6yv9&sz=w200" alt="Logo" class="bb-logo">
    <div class="portal-title">Voucher Portal</div>
  </div>

  <script>
    // ✅ NEW: Standardized API wrapper — replaces google.script.run for GitHub Pages hosting.
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxQmsFSiEtRt6K6GShxg1P5A0G9g8RICU9qx4AGz3ZwTM4JkGw2cAcZjt-H4ctEIQ8/exec'; // <-- paste your /exec URL here
window.voucherBaseUrl = WEB_APP_URL;
    
async function apiCall(action, payload) {
  const response = await fetch(WEB_APP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action, payload })
  });
  if (!response.ok) throw new Error(`Server error (${response.status})`);

  const json = await response.json();
  if (!json.ok) throw new Error(json.error || 'Unknown server error');
  return json.data; // unwrap the envelope — callers keep working exactly as before
}

    function navigateTo(url) {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(url); // Talks to Native Stack
      } else {
        window.open(url, '_top'); // Standard web fallback
      }
    }
  </script>

  <a href="javascript:void(0)" onclick="navigateTo(WEB_APP_URL + '?action=employee')" class="portal-btn">
    <div class="d-flex align-items-center">
      <div class="btn-icon icon-emp">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>
      </div>
      <div class="btn-text"><h5>Employee</h5><p>View & Submit Vouchers</p></div>
    </div>
    <div class="chevron">›</div>
  </a>

  <a href="javascript:void(0)" onclick="navigateTo(WEB_APP_URL + '?action=approver')" class="portal-btn">
    <div class="d-flex align-items-center">
      <div class="btn-icon icon-app">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
      </div>
      <div class="btn-text"><h5>Approver</h5><p>Review Pending Requests</p></div>
    </div>
    <div class="chevron">›</div>
  </a>

  <a href="javascript:void(0)" onclick="navigateTo(WEB_APP_URL + '?action=accounts')" class="portal-btn">
    <div class="d-flex align-items-center">
      <div class="btn-icon icon-acc">
        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 0 1 3 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 0 0-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 0 1-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 0 0 3 15h-.75M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm3 0h.008v.008H18V10.5Zm-12 0h.008v.008H6V10.5Z" /></svg>
      </div>
      <div class="btn-text"><h5>Accounts</h5><p>Process Final Payments</p></div>
    </div>
    <div class="chevron">›</div>
  </a>
</body>
</html>
